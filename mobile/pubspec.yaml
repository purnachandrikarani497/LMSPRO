name: lmspro_mobile
description: LearnHub LMS — Flutter app (Android & iOS) using the existing LMSPRO backend API.
publish_to: "none"
version: 1.0.6+7

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.2
  provider: ^6.1.2
  go_router: ^14.6.2
  cached_network_image: ^3.4.1
  device_info_plus: ^11.2.0
  shared_preferences: ^2.3.3
  video_player: ^2.11.1
  chewie: ^1.13.0
  webview_flutter: ^4.13.1
  google_sign_in: ^7.2.0
  screen_protector: ^1.5.1
  path_provider: ^2.1.5
  open_file: ^3.5.10
  google_fonts: ^8.0.2
  pdfx: ^2.9.2
  url_launcher: ^6.3.1
  image_picker: ^1.1.2
  file_picker: ^8.1.6
  razorpay_flutter: ^1.4.0
  youtube_player_iframe: ^5.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/learnhub_icon_square.png"
  adaptive_icon_background: "#F59E0B"
  adaptive_icon_foreground: "assets/learnhub_icon_square.png"

flutter:
  uses-material-design: true
  fonts:
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans.ttf
    - family: SpaceGrotesk
      fonts:
        - asset: assets/fonts/SpaceGrotesk.ttf
